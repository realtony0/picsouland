<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
  <title id="title">Logo PicsouLand</title>
  <desc id="desc">Logo horizontal de PicsouLand avec une piece doree et le nom du site.</desc>
  <defs>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8c95d"/>
      <stop offset="55%" stop-color="#e39a24"/>
      <stop offset="100%" stop-color="#c96b11"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fffaf0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="translate(20 20)">
    <circle cx="90" cy="90" r="82" fill="url(#coin)"/>
    <circle cx="90" cy="90" r="68" fill="none" stroke="#fff3d0" stroke-width="10" opacity="0.7"/>
    <path d="M63 146V34h50c36 0 55 17 55 46 0 31-22 50-58 50H90v16H63Zm27-39h18c20 0 31-10 31-24 0-14-10-22-28-22H90v46Z" fill="#fffaf1"/>
    <path d="M142 25l8 17 17 8-17 8-8 17-8-17-17-8 17-8 8-17Z" fill="#fff7df"/>
    <ellipse cx="63" cy="56" rx="34" ry="20" fill="url(#shine)" opacity="0.55"/>
  </g>

  <g transform="translate(220 42)">
    <text x="0" y="76" font-size="84" font-weight="700" font-family="Georgia, 'Times New Roman', serif" fill="#231d17">PicsouLand</text>
    <text x="4" y="126" font-size="28" font-family="Arial, Helvetica, sans-serif" letter-spacing="3" fill="#8a5a1c">PUFFS AU SENEGAL</text>
    <rect x="4" y="148" width="188" height="10" rx="5" fill="#d45b1f" opacity="0.78"/>
    <rect x="206" y="148" width="96" height="10" rx="5" fill="#0d7666" opacity="0.7"/>
  </g>
</svg>
